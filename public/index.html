<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Angel Name Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#0f172a",
              mist: "#e8eef6",
              sky: "#3b6ea5",
              skydeep: "#1e4a7a",
              gold: "#c9a227",
            },
            fontFamily: {
              display: ['"Cormorant Garamond"', "Georgia", "serif"],
              body: ['"Source Sans 3"', "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background:
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(59, 110, 165, 0.18), transparent),
          radial-gradient(ellipse 60% 40% at 100% 100%, rgba(201, 162, 39, 0.08), transparent),
          linear-gradient(180deg, #f4f7fb 0%, #e8eef6 100%);
        min-height: 100vh;
      }
      .field:focus-within label {
        color: #1e4a7a;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-in {
        animation: fadeIn 0.35s ease-out;
      }
    </style>
  </head>
  <body class="font-body text-ink antialiased">
    <main class="mx-auto flex min-h-screen max-w-lg flex-col justify-center px-5 py-12">
      <header class="mb-10 text-center animate-in">
        <p class="font-display text-4xl font-semibold tracking-wide text-skydeep sm:text-5xl">
          Angel Name Registry
        </p>
        <p class="mt-3 text-base text-slate-600">
          Submit your real name and angel name. We’ll keep the pairing on file.
        </p>
      </header>

      <form
        id="submit-form"
        class="animate-in space-y-6 rounded-2xl border border-slate-200/80 bg-white/80 p-6 shadow-sm backdrop-blur sm:p-8"
        style="animation-delay: 0.08s"
        novalidate
      >
        <div class="field">
          <label for="real_name" class="mb-1.5 block text-sm font-medium text-slate-700">
            Real Name
          </label>
          <input
            id="real_name"
            name="real_name"
            type="text"
            autocomplete="name"
            maxlength="120"
            required
            placeholder="e.g. Alex Rivera"
            class="w-full rounded-lg border border-slate-300 bg-white px-3.5 py-2.5 text-ink outline-none transition focus:border-sky focus:ring-2 focus:ring-sky/25"
          />
        </div>

        <div class="field">
          <label for="angel_name" class="mb-1.5 block text-sm font-medium text-slate-700">
            Angel Name
          </label>
          <input
            id="angel_name"
            name="angel_name"
            type="text"
            maxlength="120"
            required
            placeholder="e.g. Seraphine"
            class="w-full rounded-lg border border-slate-300 bg-white px-3.5 py-2.5 text-ink outline-none transition focus:border-sky focus:ring-2 focus:ring-sky/25"
          />
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full rounded-lg bg-skydeep px-4 py-3 text-sm font-semibold tracking-wide text-white transition hover:bg-sky active:scale-[0.99] disabled:cursor-not-allowed disabled:opacity-60"
        >
          Submit
        </button>

        <div
          id="message"
          role="status"
          aria-live="polite"
          class="hidden rounded-lg px-3.5 py-3 text-sm animate-in"
        ></div>
      </form>

      <p class="mt-8 text-center text-xs text-slate-500">
        Your submission is stored securely and marked pending for processing.
      </p>
    </main>

    <script>
      const form = document.getElementById("submit-form");
      const btn = document.getElementById("submit-btn");
      const message = document.getElementById("message");

      function showMessage(text, ok) {
        message.textContent = text;
        message.className =
          "rounded-lg px-3.5 py-3 text-sm animate-in " +
          (ok
            ? "bg-emerald-50 text-emerald-800 border border-emerald-200"
            : "bg-red-50 text-red-800 border border-red-200");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        message.classList.add("hidden");

        const real_name = document.getElementById("real_name").value.trim();
        const angel_name = document.getElementById("angel_name").value.trim();

        if (!real_name || !angel_name) {
          showMessage("Please fill in both Real Name and Angel Name.", false);
          return;
        }

        btn.disabled = true;
        btn.textContent = "Submitting…";

        try {
          const res = await fetch("/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ real_name, angel_name }),
          });
          const data = await res.json();

          if (!res.ok || !data.success) {
            const detail =
              data.details
                ? Object.values(data.details).flat().join(" ")
                : data.error || "Something went wrong.";
            showMessage(detail, false);
            return;
          }

          showMessage(
            "Saved successfully. Status: " + data.entry.status + ".",
            true
          );
          form.reset();
        } catch (err) {
          showMessage("Network error. Please try again.", false);
        } finally {
          btn.disabled = false;
          btn.textContent = "Submit";
        }
      });
    </script>
  </body>
</html>
