<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Requests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", system-ui, sans-serif;
        min-height: 100vh;
        background: #111827;
        color: #e5e7eb;
      }
      .status-pending {
        color: #fbbf24;
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .status-pending:hover {
        color: #fde68a;
      }
      .status-complete {
        color: #6ee7b7;
      }
      .status-other {
        color: #9ca3af;
      }
    </style>
  </head>
  <body class="px-5 py-8 sm:px-8">
    <main class="mx-auto max-w-3xl">
      <header class="mb-8 flex flex-wrap items-end justify-between gap-4">
        <div>
          <h1 class="text-2xl font-semibold text-white">Requests</h1>
          <p id="subtitle" class="mt-1 text-sm text-gray-400">Loading…</p>
        </div>
        <button
          id="logout-btn"
          type="button"
          class="rounded-lg border border-gray-700 px-3 py-1.5 text-sm text-gray-300 hover:bg-gray-800"
        >
          Log out
        </button>
      </header>

      <div
        id="list"
        class="overflow-hidden rounded-xl border border-gray-800 bg-gray-900/60"
      >
        <div class="grid grid-cols-[1fr_1fr] gap-3 border-b border-gray-800 px-4 py-3 text-xs font-medium uppercase tracking-wide text-gray-500 sm:grid-cols-[1.2fr_1.4fr_0.7fr]">
          <span>Angel name</span>
          <span>Graphic</span>
          <span class="hidden sm:inline">Status</span>
        </div>
        <div id="rows" class="divide-y divide-gray-800"></div>
      </div>

      <p id="empty" class="mt-6 hidden text-sm text-gray-500">No requests yet.</p>
      <p id="error" class="mt-6 hidden text-sm text-rose-400"></p>
      <p class="mt-4 text-xs text-gray-500">
        Tip: click <span class="text-amber-300">pending</span> to mark a request complete.
      </p>
    </main>

    <script>
      const rowsEl = document.getElementById("rows");
      const subtitle = document.getElementById("subtitle");
      const empty = document.getElementById("empty");
      const errorEl = document.getElementById("error");
      let adminEmail = "";

      async function ensureAuth() {
        const res = await fetch("/admin/me", { credentials: "include" });
        if (!res.ok) {
          window.location.href = "/admin/login";
          return null;
        }
        const data = await res.json();
        return data.admin;
      }

      function graphicText(entry) {
        if (entry.graphic_label && entry.graphic_code) {
          return entry.graphic_label + " (" + entry.graphic_code + ")";
        }
        return entry.graphic_label || entry.graphic_code || "—";
      }

      function statusLabel(status) {
        if (status === "processed") return "complete";
        return status;
      }

      function statusClass(status) {
        if (status === "pending" || status === "processing") return "status-pending";
        if (status === "processed") return "status-complete";
        return "status-other";
      }

      function canMarkComplete(status) {
        return status === "pending" || status === "processing";
      }

      async function markComplete(id, buttonEls) {
        for (const el of buttonEls) {
          el.textContent = "…";
          el.style.pointerEvents = "none";
        }

        try {
          const res = await fetch("/admin/entries/" + id + "/complete", {
            method: "PATCH",
            credentials: "include",
          });
          if (res.status === 401) {
            window.location.href = "/admin/login";
            return;
          }
          const data = await res.json();
          if (!res.ok || !data.success) {
            errorEl.textContent = data.error || "Could not update status";
            errorEl.classList.remove("hidden");
            await loadEntries();
            return;
          }
          await loadEntries();
        } catch {
          errorEl.textContent = "Network error updating status";
          errorEl.classList.remove("hidden");
          await loadEntries();
        }
      }

      function renderStatusControl(entry) {
        const label = statusLabel(entry.status);
        const cls = statusClass(entry.status);
        if (canMarkComplete(entry.status)) {
          return (
            '<button type="button" data-complete="' +
            escapeHtml(entry.id) +
            '" class="' +
            cls +
            ' text-sm capitalize bg-transparent p-0 border-0" title="Mark complete">' +
            escapeHtml(label) +
            "</button>"
          );
        }
        return (
          '<span class="' +
          cls +
          ' text-sm capitalize">' +
          escapeHtml(label) +
          "</span>"
        );
      }

      async function loadEntries() {
        errorEl.classList.add("hidden");
        const res = await fetch("/admin/entries", { credentials: "include" });
        if (res.status === 401) {
          window.location.href = "/admin/login";
          return;
        }
        const data = await res.json();
        if (!res.ok || !data.success) {
          errorEl.textContent = data.error || "Could not load entries";
          errorEl.classList.remove("hidden");
          return;
        }

        const entries = data.entries || [];
        subtitle.textContent = adminEmail
          ? adminEmail + " · " + entries.length + " total"
          : entries.length + " total";
        rowsEl.innerHTML = "";
        empty.classList.toggle("hidden", entries.length > 0);

        if (!entries.length) return;

        for (const entry of entries) {
          const row = document.createElement("div");
          row.className =
            "grid grid-cols-[1fr_1fr] gap-3 px-4 py-3.5 sm:grid-cols-[1.2fr_1.4fr_0.7fr]";
          row.innerHTML =
            '<div class="min-w-0">' +
            '<p class="truncate font-medium text-white">' +
            escapeHtml(entry.angel_name) +
            "</p>" +
            '<div class="mt-0.5 sm:hidden">' +
            renderStatusControl(entry) +
            "</div>" +
            "</div>" +
            '<div class="min-w-0 text-sm text-gray-300">' +
            escapeHtml(graphicText(entry)) +
            "</div>" +
            '<div class="hidden sm:block">' +
            renderStatusControl(entry) +
            "</div>";
          rowsEl.appendChild(row);
        }

        rowsEl.querySelectorAll("[data-complete]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const id = btn.getAttribute("data-complete");
            if (!id) return;
            const twins = rowsEl.querySelectorAll(
              '[data-complete="' + id + '"]'
            );
            markComplete(id, twins);
          });
        });
      }

      function escapeHtml(str) {
        return String(str ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      document.getElementById("logout-btn").addEventListener("click", async () => {
        await fetch("/admin/logout", {
          method: "POST",
          credentials: "include",
        });
        window.location.href = "/admin/login";
      });

      (async () => {
        const admin = await ensureAuth();
        if (!admin) return;
        adminEmail = admin.email;
        subtitle.textContent = admin.email;
        await loadEntries();
      })();
    </script>
  </body>
</html>
