<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Audrey’s Angel Graphics</title>
    <meta name="robots" content="noindex" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              dusk: "#0a0806",
              honey: "#f0c45c",
              cream: "#fff6e4",
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/site.css" />
  </head>
  <body data-no-popup>
    <div class="orb" style="width:300px;height:300px;background:#f0c45c;top:8%;left:8%;opacity:0.15"></div>
    <div class="orb" style="width:340px;height:340px;background:#e8a838;bottom:10%;right:4%;opacity:0.1;animation-delay:1.2s"></div>

    <main class="relative z-10 mx-auto flex min-h-screen max-w-md flex-col justify-center px-5 py-16">
      <div class="text-center">
        <a href="/" class="inline-flex items-center gap-2 text-sm font-semibold tracking-wide" style="color:var(--cream);text-decoration:none">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8L12 2z" fill="#f0c45c" />
          </svg>
          Audrey’s Angel Graphics
        </a>
        <h1 class="headline mt-8 text-3xl font-bold text-cream">Choose a new password.</h1>
        <p class="mt-3 text-sm font-light leading-relaxed text-cream/55">
          This link works once and expires an hour after it was sent.
        </p>
      </div>

      <form id="reset-form" class="glass-panel mt-8 space-y-5 rounded-[1.75rem] p-6 sm:p-8">
        <div class="field">
          <label for="new-password">New password</label>
          <input
            id="new-password"
            type="password"
            maxlength="200"
            autocomplete="new-password"
            required
            placeholder="10+ chars, mixed case, number, symbol"
          />
          <p class="mt-1.5 text-xs text-cream/45">
            At least 10 characters with upper &amp; lower case, a number, and a
            special character.
          </p>
        </div>
        <div class="field">
          <label for="confirm-password">Confirm new password</label>
          <input
            id="confirm-password"
            type="password"
            maxlength="200"
            autocomplete="new-password"
            required
            placeholder="Same password again"
          />
        </div>
        <button type="submit" id="reset-btn" class="btn-primary w-full">Reset password</button>
        <div
          id="message"
          role="status"
          aria-live="polite"
          hidden
          class="rounded-2xl px-4 py-3.5 text-sm leading-relaxed"
        ></div>
        <p id="done-actions" class="hidden text-center">
          <a href="/" class="btn-secondary" style="padding:0.6rem 1.4rem;font-size:0.8125rem">Back to home</a>
        </p>
      </form>
    </main>

    <script>
      const form = document.getElementById("reset-form");
      const btn = document.getElementById("reset-btn");
      const message = document.getElementById("message");
      const token = new URLSearchParams(window.location.search).get("token") || "";

      function showMessage(text, ok) {
        message.hidden = false;
        message.textContent = text;
        message.className =
          "rounded-2xl px-4 py-3.5 text-sm leading-relaxed " +
          (ok
            ? "border border-emerald-400/40 bg-emerald-500/15 text-emerald-100"
            : "border border-rose-400/40 bg-rose-500/15 text-rose-100");
      }

      if (!token) {
        showMessage(
          "This reset link is missing its token. Open the link from your email again, or request a new one from the login window.",
          false
        );
        btn.disabled = true;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        message.hidden = true;

        const newPassword = document.getElementById("new-password").value;
        const confirm = document.getElementById("confirm-password").value;
        if (newPassword !== confirm) {
          showMessage("Those passwords don’t match — try again.", false);
          return;
        }

        btn.disabled = true;
        btn.textContent = "Resetting…";
        try {
          const res = await fetch("/api/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, new_password: newPassword }),
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            const detail = data.details
              ? Object.values(data.details).flat().join(" ")
              : data.error || "Couldn’t reset your password.";
            showMessage(detail, false);
            return;
          }
          showMessage(
            (data.message || "Password reset.") + " Use the Log in button on any page to sign back in.",
            true
          );
          form.querySelectorAll("input, button[type='submit']").forEach((el) => (el.disabled = true));
          document.getElementById("done-actions").classList.remove("hidden");
        } catch {
          showMessage("Network glitch. Try again in a sec.", false);
        } finally {
          if (!message.textContent.includes("Use the Log in")) {
            btn.disabled = false;
            btn.textContent = "Reset password";
          }
        }
      });
    </script>
  </body>
</html>
