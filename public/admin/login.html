<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Outfit", system-ui, sans-serif;
        min-height: 100vh;
        background: #111827;
        color: #e5e7eb;
      }
    </style>
  </head>
  <body class="flex min-h-screen items-center justify-center px-5 py-10">
    <main class="w-full max-w-sm">
      <h1 class="text-2xl font-semibold text-white">Admin login</h1>
      <p class="mt-1 text-sm text-gray-400">Sign in to view requests.</p>

      <form id="login-form" class="mt-8 space-y-4" novalidate>
        <div>
          <label for="email" class="mb-1 block text-sm text-gray-300">Email</label>
          <input
            id="email"
            type="email"
            autocomplete="username"
            required
            class="w-full rounded-lg border border-gray-700 bg-gray-900 px-3 py-2.5 text-sm text-white outline-none focus:border-gray-500"
          />
        </div>
        <div>
          <label for="password" class="mb-1 block text-sm text-gray-300">Password</label>
          <input
            id="password"
            type="password"
            autocomplete="current-password"
            required
            class="w-full rounded-lg border border-gray-700 bg-gray-900 px-3 py-2.5 text-sm text-white outline-none focus:border-gray-500"
          />
        </div>
        <button
          id="login-btn"
          type="submit"
          class="w-full rounded-lg bg-white px-4 py-2.5 text-sm font-semibold text-gray-900 hover:bg-gray-100 disabled:opacity-50"
        >
          Log in
        </button>
        <p id="message" class="hidden text-sm" role="status"></p>
      </form>

      <p class="mt-8 text-center text-xs text-gray-500">
        <a href="/" class="underline hover:text-gray-300">Back to form</a>
      </p>
    </main>

    <script>
      (async () => {
        try {
          const me = await fetch("/admin/me", { credentials: "include" });
          if (me.ok) {
            window.location.href = "/admin/";
          }
        } catch {}
      })();

      const form = document.getElementById("login-form");
      const btn = document.getElementById("login-btn");
      const message = document.getElementById("message");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        message.classList.add("hidden");
        btn.disabled = true;
        btn.textContent = "Signing in…";

        try {
          const res = await fetch("/admin/login", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: document.getElementById("email").value.trim(),
              password: document.getElementById("password").value,
            }),
          });
          const data = await res.json();
          if (!res.ok || !data.success) {
            message.textContent = data.error || "Login failed";
            message.className = "text-sm text-rose-400";
            return;
          }
          window.location.href = "/admin/";
        } catch {
          message.textContent = "Network error";
          message.className = "text-sm text-rose-400";
        } finally {
          btn.disabled = false;
          btn.textContent = "Log in";
        }
      });
    </script>
  </body>
</html>
